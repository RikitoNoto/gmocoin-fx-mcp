name: Release

on:
  workflow_dispatch:

jobs:
  build-and-publish-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # Required by `mcp-publisher login github-oidc`; no MCP Registry secret is needed.
      id-token: write
    env:
      REGISTRY: ghcr.io

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          version=$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Prepare image name
        id: image
        run: |
          image_name=$(echo "$REGISTRY/$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Update server.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          jq \
            --arg version "$VERSION" \
            --arg identifier "$IMAGE_NAME:$VERSION" \
            '.version = $version | .packages[0].identifier = $identifier' \
            server.json > server.json.tmp
          mv server.json.tmp server.json

      - name: Commit server.json version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- server.json; then
            echo "server.json is already up to date."
          else
            git add server.json
            git commit -m "Update server.json for v${{ steps.version.outputs.version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Skipping tag creation."
          else
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Generate release note
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists. Skipping release creation."
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish MCP server to Registry
        run: ./mcp-publisher publish
